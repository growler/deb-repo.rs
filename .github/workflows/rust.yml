name: Rust

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_HOME: ${{ github.workspace }}/target/cargo-home

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.89.0
          components: rustfmt,clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            target/cargo-home/bin
            target/cargo-home/registry/index
            target/cargo-home/registry/cache
            target/cargo-home/git/db
          key: cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install system dependencies
        env: 
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            build-essential \
            debhelper \
            devscripts \
            libbz2-dev \
            libcurl4-openssl-dev \
            libgpg-error-dev \
            libgpgme-dev \
            liblz4-dev \
            liblzma-dev \
            libssl-dev \
            libunistring-dev \
            libzstd-dev \
            zlib1g-dev \
            podman

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build

      - name: Run tests
        run: cargo test

  warm_trees:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.89.0

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            target/cargo-home/bin
            target/cargo-home/registry/index
            target/cargo-home/registry/cache
            target/cargo-home/git/db
          key: cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install system dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            build-essential \
            debhelper \
            devscripts \
            libbz2-dev \
            libcurl4-openssl-dev \
            libgpg-error-dev \
            libgpgme-dev \
            liblz4-dev \
            liblzma-dev \
            libssl-dev \
            libunistring-dev \
            libzstd-dev \
            zlib1g-dev \
            podman

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build rdebootstrap binary
        run: cargo build -p rdebootstrap

      - name: Build and publish missing OS trees
        env:
          GHCR_REPO: ghcr.io/${{ github.repository_owner }}/rdebootstrap-trees
        run: |
          set -euo pipefail
          for distro in debian ubuntu; do
            spec_hash="$(./target/debug/rdebootstrap -m "${distro}-build.toml" spec hash)"
            artifact="${GHCR_REPO}:${distro}-${spec_hash}"
            if oras manifest fetch "$artifact" >/dev/null 2>&1; then
              echo "Found ${artifact}, skipping build"
              continue
            fi

            make "${distro}-tree" DOWNLOADS=1
            tarball="target/${distro}-tree-${spec_hash}.tar.zst"
            tar --zstd -cf "$tarball" -C "target/${distro}-tree" "${spec_hash}"
            (
              cd target
              oras push "$artifact" \
                --artifact-type application/vnd.rdebootstrap.tree.v1 \
                "${tarball##*/}:application/vnd.rdebootstrap.tree.layer.v1.tar+zstd"
            )
          done

  package_release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.89.0

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            target/cargo-home/bin
            target/cargo-home/registry/index
            target/cargo-home/registry/cache
            target/cargo-home/git/db
          key: cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install system dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            pkg-config \
            build-essential \
            debhelper \
            devscripts \
            libbz2-dev \
            libcurl4-openssl-dev \
            libgpg-error-dev \
            libgpgme-dev \
            liblz4-dev \
            liblzma-dev \
            libssl-dev \
            libunistring-dev \
            libzstd-dev \
            zlib1g-dev \
            podman

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build rdebootstrap binary
        run: cargo build -p rdebootstrap

      - name: Package source files
        run: |
          podman unshare dpkg-buildpackage -us -S -d -tc
          mv ../rdebootstrap_*.{dsc,tar.xz} target

      - name: Restore or build OS trees
        env:
          GHCR_REPO: ghcr.io/${{ github.repository_owner }}/rdebootstrap-trees
        run: |
          set -euo pipefail
          for distro in debian ubuntu; do
            spec_hash="$(./target/debug/rdebootstrap -m "${distro}-build.toml" spec hash)"
            artifact="${GHCR_REPO}:${distro}-${spec_hash}"
            tarball="target/${distro}-tree-${spec_hash}.tar.zst"
            rm -f "$tarball"
            rm -f "target/target/${distro}-tree-${spec_hash}.tar.zst"
            mkdir -p "target/${distro}-tree"

            if oras pull --output "$PWD/target" "$artifact"; then
              if [ ! -f "$tarball" ] && [ -f "target/target/${distro}-tree-${spec_hash}.tar.zst" ]; then
                mv "target/target/${distro}-tree-${spec_hash}.tar.zst" "$tarball"
              fi
              tar --zstd -xf "$tarball" -C "target/${distro}-tree"
              continue
            fi

            make "${distro}-tree" DOWNLOADS=1
            tar --zstd -cf "$tarball" -C "target/${distro}-tree" "${spec_hash}"
            (
              cd target
              oras push "$artifact" \
                --artifact-type application/vnd.rdebootstrap.tree.v1 \
                "${tarball##*/}:application/vnd.rdebootstrap.tree.layer.v1.tar+zstd"
            )
          done

      - name: Build debian packages
        run: make debian-packages DOWNLOADS=1

      - name: Build ubuntu packages
        run: make ubuntu-packages DOWNLOADS=1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/*.deb
            target/*.dsc
            target/*.tar.xz
            target/*.buildinfo
            target/*.changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
